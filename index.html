<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>下班以后 — Bài học tương tác HSK 1</title>
<!--
  ============================================================
  BÀI HỌC TƯƠNG TÁC TIẾNG TRUNG · HSK 1
  Chủ đề: 下班以后 (Sau khi tan làm) · Cấu trúc: 你的电话号码是多少？
  - File HTML đơn, chạy offline, KHÔNG cần thư viện ngoài.
  - GIÁO VIÊN MUỐN SỬA NỘI DUNG: kéo xuống phần <script>,
    mọi từ vựng / câu hỏi nằm trong khối "DỮ LIỆU" có chú thích.
  - Tái sử dụng cho bài HSK khác: chỉ đổi khối DỮ LIỆU,
    phần ENGINE bên dưới giữ nguyên.
  - 11 phần: Giới thiệu · Từ vựng · Flashcards · Luyện từ vựng ·
    Bài đọc · Đọc hiểu · Luyện nghe · Luyện viết · Luyện nói ·
    Củng cố · Quiz tổng hợp.
  ============================================================
-->
<style>
  /* ====== BẢNG MÀU & BIẾN (đổi màu tại đây) — TÔNG HỒNG PASTEL – TÍM – TRẮNG ====== */
  :root{
    --bg:#fff6f9; --ink:#3d2540; --muted:#93718f;
    --primary:#d6467e;  --primary-soft:#fde3ee;   /* hồng chủ đạo */
    --accent:#8b5cf6;   --accent-soft:#f1eafe;    /* tím phụ trợ */
    --green:#16a34a; --green-soft:#dcfce7;
    --red:#dc2652;   --red-soft:#fde2e8;
    --gold:#f2a93b;  --gold-soft:#fdeecf;
    --card:#ffffff; --line:#f5d7e5; --radius:18px;
    --shadow:0 10px 28px rgba(214,70,126,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{font-size:18px}                 /* cỡ chữ gốc — nút A−/A+ thay đổi giá trị này */
  body{
    background:linear-gradient(180deg,#fff9fb,#fdeef5 60%,#f7effe);
    color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
    font-size:1rem; line-height:1.6; -webkit-text-size-adjust:100%;
  }
  .hz,.cn{font-family:"Kaiti SC","KaiTi","STKaiti","Noto Serif CJK SC","Songti SC","PingFang SC","Microsoft YaHei",serif;}
  .py{color:var(--primary);font-style:italic}
  .py-sm{color:var(--muted);font-size:.85em;font-style:italic}
  .en{color:var(--accent);font-size:.9em}
  .vi{color:var(--ink)}
  .wrap{max-width:960px;margin:0 auto;padding:0 16px 80px}
  button{font-family:inherit}

  /* ====== HEADER ====== */
  header.top{text-align:center;padding:26px 16px 8px}
  header.top .badge{display:inline-block;background:var(--accent-soft);color:#6d28d9;
    font-weight:700;padding:4px 14px;border-radius:999px;font-size:.8rem;letter-spacing:.5px}
  header.top h1{margin:.35em 0 .1em;font-size:2.1rem}
  header.top h1 .cn{color:var(--primary)}
  header.top .sub{color:var(--muted);margin:0}
  .fontctl{display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px 8px;box-shadow:var(--shadow)}
  .fontctl button{border:0;background:var(--primary-soft);color:var(--primary);font-weight:800;
    width:36px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem}
  .fontctl button:hover{filter:brightness(.96)}
  .fontctl .lbl{font-size:.8rem;color:var(--muted);min-width:44px;text-align:center;font-weight:700}
  .progress{height:9px;background:#f7dcE9;background:#f7dce9;border-radius:999px;overflow:hidden;max-width:960px;margin:14px auto 0}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));width:9%;transition:width .4s}
  .progress-lbl{text-align:center;font-size:.78rem;color:var(--muted);margin-top:4px}

  /* ====== NAV ====== */
  nav.steps{position:sticky;top:0;z-index:30;background:rgba(255,249,251,.95);
    backdrop-filter:blur(6px);border-bottom:1px solid var(--line);margin-top:14px}
  nav.steps .inner{max-width:960px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;padding:10px 12px;scrollbar-width:thin}
  nav.steps button{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:8px 13px;border-radius:999px;font-size:.88rem;cursor:pointer;white-space:nowrap;transition:all .2s;font-weight:600}
  nav.steps button .n{display:inline-flex;width:22px;height:22px;border-radius:50%;background:#fbe7f1;color:var(--muted);
    align-items:center;justify-content:center;font-size:.78rem;margin-right:6px}
  nav.steps button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  nav.steps button.active .n{background:#fff;color:var(--primary)}
  nav.steps button.done .n{background:var(--green);color:#fff}

  /* ====== SECTION ====== */
  section.step{display:none;animation:fade .35s ease}
  section.step.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .step h2{font-size:1.55rem;margin:26px 0 4px;display:flex;align-items:center;gap:10px}
  .step h2 .ic{font-size:1.35rem}
  .step .desc{color:var(--muted);margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px;margin-bottom:18px}
  .card h3{margin:0 0 10px;font-size:1.12rem;color:var(--primary)}
  .pill{display:inline-block;background:var(--primary-soft);color:var(--primary);border-radius:999px;
    padding:2px 12px;font-size:.8rem;font-weight:700;margin-bottom:8px}
  .stepnav{display:flex;justify-content:space-between;gap:10px;margin-top:8px}
  .btn{border:0;border-radius:12px;padding:11px 20px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .18s}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-ghost{background:var(--card);color:var(--primary);border:1.5px solid var(--primary)}
  .btn-soft{background:var(--primary-soft);color:var(--primary)}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-sm{padding:6px 13px;font-size:.85rem;border-radius:9px}
  .btn-audio{background:var(--accent-soft);color:var(--accent);border:0;border-radius:999px;
    padding:6px 13px;font-size:.9rem;cursor:pointer;font-weight:700}
  .btn-audio:hover{filter:brightness(.96)}

  /* ====== PHẦN 1: GIỚI THIỆU ====== */
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
  .meta-grid .m{background:var(--primary-soft);border-radius:14px;padding:14px;text-align:center}
  .meta-grid .m b{display:block;font-size:1.15rem;color:var(--primary)}
  .meta-grid .m span{font-size:.85rem;color:var(--muted)}
  ul.goals{padding-left:22px;margin:8px 0}
  ul.goals li{margin:6px 0}
  .chipbox{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--accent-soft);border-radius:999px;padding:6px 14px;font-size:.95rem}
  .chip .hz{font-weight:700;color:#6d28d9}
  .keysent{background:linear-gradient(120deg,var(--primary-soft),var(--accent-soft));
    border-radius:14px;padding:18px;text-align:center}
  .keysent .hz{font-size:1.7rem;font-weight:700;color:var(--primary)}

  /* ====== PHẦN 2: TỪ VỰNG (cards) ====== */
  .vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .vcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px;transition:transform .2s}
  .vcard:hover{transform:translateY(-3px)}
  .vcard .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .vcard .hz{font-size:2rem;font-weight:700;color:var(--primary)}
  .vcard .emoji{font-size:1.6rem}
  .vcard .pyl{font-size:1.05rem}
  .vcard .mean{margin:4px 0 2px}
  .vcard .pos{display:inline-block;background:var(--gold-soft);color:#a16207;font-size:.72rem;
    font-weight:700;border-radius:6px;padding:1px 8px;vertical-align:middle;margin-left:6px}
  .vcard .ex{background:#fdf3f8;border-left:3px solid var(--primary);border-radius:0 10px 10px 0;
    padding:9px 12px;margin-top:10px;font-size:.93rem}
  .vcard .ex .hz{font-size:1.08rem;color:var(--ink);font-weight:600}

  /* ====== PHẦN 3: FLASHCARDS ====== */
  .fc-stage{perspective:1200px;max-width:430px;margin:0 auto}
  .fc{position:relative;width:100%;min-height:290px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s}
  .fc.flip{transform:rotateY(180deg)}
  .fc .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:22px;text-align:center;box-shadow:var(--shadow)}
  .fc .front{background:linear-gradient(140deg,#fff,#fdeaf3);border:1.5px solid var(--line)}
  .fc .front .hz{font-size:4rem;font-weight:700;color:var(--primary)}
  .fc .back{background:linear-gradient(140deg,var(--primary),var(--accent));color:#fff;transform:rotateY(180deg)}
  .fc .back .py{color:#ffe3f0;font-size:1.5rem;font-weight:700;font-style:normal}
  .fc .back .m{font-size:1.15rem;margin:4px 0}
  .fc .back .ex{background:rgba(255,255,255,.16);border-radius:12px;padding:8px 12px;margin-top:10px;font-size:.9rem}
  .fc-hint{text-align:center;color:var(--muted);font-size:.85rem;margin-top:8px}
  .fc-ctl{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:14px}
  .fc-count{text-align:center;font-weight:700;color:var(--primary);margin-top:10px}

  /* ====== GẠCH (tiles) dùng chung: nối cặp, sắp xếp ====== */
  .tiles{display:flex;flex-wrap:wrap;gap:9px;margin:10px 0}
  .tile{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:9px 15px;
    cursor:pointer;font-size:1rem;transition:all .15s;user-select:none}
  .tile:hover{border-color:var(--primary)}
  .tile.sel{background:var(--primary);color:#fff;border-color:var(--primary)}
  .tile.ok{background:var(--green-soft);border-color:var(--green);color:var(--green);pointer-events:none;opacity:.75}
  .tile.err{animation:shake .35s}
  .tile.used{opacity:.35;pointer-events:none}
  @keyframes shake{0%,100%{transform:none}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .match-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .match-cols h4{margin:0 0 8px;font-size:.9rem;color:var(--muted);text-align:center}
  .match-cols .tiles{flex-direction:column}
  .match-cols .tile{text-align:center}

  /* ====== MCQ / bài tập ====== */
  .q{border-bottom:1px dashed var(--line);padding:14px 0}
  .q:last-of-type{border-bottom:0}
  .q .qt{font-weight:700;margin-bottom:9px}
  .q .qt .hz{font-size:1.15em}
  .opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
  .opt{border:1.5px solid var(--line);background:#fffafc;border-radius:11px;padding:9px 13px;
    cursor:pointer;font-size:.98rem;text-align:left;transition:all .15s}
  .opt:hover{border-color:var(--primary)}
  .opt.right{background:var(--green-soft);border-color:var(--green);color:#14532d;font-weight:700}
  .opt.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
  .opt:disabled{cursor:default}
  .expl{display:none;background:var(--accent-soft);border-radius:10px;padding:9px 13px;
    margin-top:9px;font-size:.9rem;color:#5b21b6}
  .expl.show{display:block}
  .scorebar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    background:var(--primary-soft);border-radius:12px;padding:10px 15px;margin-top:12px}
  .scorebar b{color:var(--primary);font-size:1.05rem}

  /* ====== MEMORY GAME ====== */
  .mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;max-width:520px;margin:0 auto}
  .mem{aspect-ratio:1/1;border-radius:13px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .35s}
  .mem.flip{transform:rotateY(180deg)}
  .mem .f{position:absolute;inset:0;border-radius:13px;display:flex;align-items:center;justify-content:center;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;padding:4px;text-align:center;font-size:.92rem}
  .mem .f1{background:linear-gradient(140deg,var(--primary),var(--accent));color:#fff;font-size:1.5rem}
  .mem .f2{background:#fff;border:1.5px solid var(--line);transform:rotateY(180deg)}
  .mem.done .f2{background:var(--green-soft);border-color:var(--green)}
  @media(max-width:480px){.mem .f{font-size:.78rem}.mem .f1{font-size:1.2rem}}

  /* ====== SẮP XẾP CÂU (arrange) ====== */
  .arr-slot{min-height:56px;background:#fdf3f8;border:2px dashed var(--line);border-radius:12px;
    display:flex;flex-wrap:wrap;gap:8px;padding:9px;margin:8px 0}
  .arr-slot .tile{background:var(--primary-soft);border-color:transparent;color:var(--primary);font-weight:700}
  .arr-fb{font-weight:700;margin-top:6px}
  .arr-fb.ok{color:var(--green)} .arr-fb.no{color:var(--red)}

  /* ====== TIMER GAME ====== */
  .timer-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .timer-big{font-size:1.5rem;font-weight:800;color:var(--primary)}
  .timer-q .hz{font-size:2.4rem;font-weight:700;text-align:center;display:block;margin:14px 0;color:var(--ink)}

  /* ====== BÀI ĐỌC ====== */
  .read-tools{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:14px}
  .toggle{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1.5px solid var(--line);
    border-radius:999px;padding:7px 14px;cursor:pointer;font-size:.88rem;font-weight:700;color:var(--muted)}
  .toggle.on{background:var(--accent-soft);border-color:var(--accent);color:#6d28d9}
  .sent{border-radius:12px;padding:9px 13px;margin-bottom:5px;transition:background .25s;display:flex;gap:9px;align-items:flex-start}
  .sent:hover{background:#fdf3f8}
  .sent.playing{background:var(--gold-soft)}
  .sent .sp{flex:0 0 auto;margin-top:3px}
  .sent .hz{font-size:1.22rem;line-height:1.9}
  .sent .hz b{color:var(--primary);font-weight:700;background:var(--primary-soft);border-radius:5px;padding:0 3px}
  .sent .spy{display:block;font-size:.88rem}
  .sent .svi{display:block;color:var(--muted);font-size:.88rem}
  body.no-py .spy{display:none}
  body.no-vi .svi{display:none}

  /* ====== LUYỆN NÓI ====== */
  .say-row{display:flex;gap:10px;align-items:flex-start;border-bottom:1px dashed var(--line);padding:10px 0}
  .say-row:last-child{border-bottom:0}
  .dlg{background:#fdf3f8;border-radius:14px;padding:14px 16px;margin:10px 0}
  .dlg .line{margin:7px 0;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
  .dlg .who{flex:0 0 auto;background:var(--accent-soft);color:#6d28d9;font-weight:700;border-radius:8px;
    padding:1px 9px;font-size:.82rem}
  .ans-hide{display:none;background:var(--green-soft);border-radius:10px;padding:8px 12px;margin-top:7px;font-size:.92rem}
  .ans-hide.show{display:block}

  /* ====== QUIZ / KẾT QUẢ ====== */
  .result-box{text-align:center;padding:26px}
  .result-box .big{font-size:2.6rem;font-weight:800;color:var(--primary)}
  .result-box .msg{font-size:1.1rem;margin-top:6px}

  /* ====== BẢNG ====== */
  table.rev{width:100%;border-collapse:collapse;font-size:.95rem}
  table.rev th,table.rev td{border:1px solid var(--line);padding:8px 10px;text-align:left}
  table.rev th{background:var(--primary-soft);color:var(--primary)}
  table.rev tr:nth-child(even){background:#fdf7fa}

  /* ====== RESPONSIVE ====== */
  @media(max-width:640px){
    header.top h1{font-size:1.6rem}
    .match-cols{grid-template-columns:1fr 1fr;gap:8px}
    .opts{grid-template-columns:1fr}
    .fc .front .hz{font-size:3rem}
    .card{padding:15px}
  }
</style>
</head>
<body>

<!-- ====== HEADER ====== -->
<header class="top">
  <span class="badge">HSK 1 · BÀI HỌC TƯƠNG TÁC · 120 PHÚT</span>
  <h1><span class="cn">下班以后</span> · Sau khi tan làm</h1>
  <p class="sub">Xiàbān yǐhòu — Từ vựng · Bài đọc · Nghe · Nói · Đọc · Viết</p>
  <div class="fontctl" title="Chỉnh cỡ chữ">
    <button id="fontMinus" aria-label="Giảm cỡ chữ">A−</button>
    <span class="lbl" id="fontLbl">100%</span>
    <button id="fontPlus" aria-label="Tăng cỡ chữ">A+</button>
  </div>
  <div class="progress"><i id="progBar"></i></div>
  <div class="progress-lbl" id="progLbl">Tiến trình: 1/11 phần</div>
</header>

<!-- ====== NAV (JS tạo nút) ====== -->
<nav class="steps"><div class="inner" id="navInner"></div></nav>

<main class="wrap" id="main">
  <!-- 11 section được JS đổ nội dung -->
  <section class="step" id="s1"></section>
  <section class="step" id="s2"></section>
  <section class="step" id="s3"></section>
  <section class="step" id="s4"></section>
  <section class="step" id="s5"></section>
  <section class="step" id="s6"></section>
  <section class="step" id="s7"></section>
  <section class="step" id="s8"></section>
  <section class="step" id="s9"></section>
  <section class="step" id="s10"></section>
  <section class="step" id="s11"></section>
</main>

<script>
/* ============================================================
   KHỐI 1 · DỮ LIỆU  (giáo viên chỉnh sửa tại đây)
   ============================================================ */

/* ---- 1.1 TỪ VỰNG ---- */
const VOCAB = [
  {hz:"真的", py:"zhēnde", vi:"thật sao, thật vậy", en:"really", pos:"phó từ", emoji:"❗",
   ex:{hz:"真的吗？我很高兴。", py:"Zhēnde ma? Wǒ hěn gāoxìng.", vi:"Thật sao? Tôi rất vui.", en:"Really? I am very happy."}},
  {hz:"睡觉", py:"shuìjiào", vi:"đi ngủ", en:"to sleep", pos:"động từ", emoji:"😴",
   ex:{hz:"我晚上十点睡觉。", py:"Wǒ wǎnshang shí diǎn shuìjiào.", vi:"Buổi tối tôi đi ngủ lúc 10 giờ.", en:"I sleep at 10 in the evening."}},
  {hz:"告诉", py:"gàosu", vi:"nói cho biết, báo cho", en:"to tell", pos:"động từ", emoji:"💬",
   ex:{hz:"我告诉你我的名字。", py:"Wǒ gàosu nǐ wǒ de míngzi.", vi:"Tôi nói cho bạn biết tên của tôi.", en:"I tell you my name."}},
  {hz:"时间", py:"shíjiān", vi:"thời gian, giờ giấc", en:"time", pos:"danh từ", emoji:"⏰",
   ex:{hz:"我没有时间。", py:"Wǒ méiyǒu shíjiān.", vi:"Tôi không có thời gian.", en:"I don't have time."}},
  {hz:"下班", py:"xiàbān", vi:"tan làm", en:"to get off work", pos:"động từ", emoji:"🏢",
   ex:{hz:"我爸爸六点下班。", py:"Wǒ bàba liù diǎn xiàbān.", vi:"Bố tôi tan làm lúc 6 giờ.", en:"My dad gets off work at 6."}},
  {hz:"以后", py:"yǐhòu", vi:"sau khi, sau đó", en:"after", pos:"danh từ", emoji:"⏭️",
   ex:{hz:"下班以后，我回家。", py:"Xiàbān yǐhòu, wǒ huí jiā.", vi:"Sau khi tan làm, tôi về nhà.", en:"After work, I go home."}},
  {hz:"走", py:"zǒu", vi:"đi bộ, đi", en:"to walk, to go", pos:"động từ", emoji:"🚶",
   ex:{hz:"我走回家。", py:"Wǒ zǒu huí jiā.", vi:"Tôi đi bộ về nhà.", en:"I walk home."}},
  {hz:"打电话", py:"dǎ diànhuà", vi:"gọi điện thoại", en:"to make a phone call", pos:"động từ", emoji:"📞",

/* ---- 2.1 Tiện ích chung ---- */
const $ = s => document.querySelector(s);
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function el(html){ const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstElementChild; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ---- 2.2 Phát âm (Speech Synthesis API) ---- */
let zhVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  zhVoice = vs.find(v=>/zh[-_]CN/i.test(v.lang)) || vs.find(v=>/^zh/i.test(v.lang)) || null;
}
if ("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text, rate=0.85, onend=null){
  if(!("speechSynthesis" in window)){ alert("Trình duyệt không hỗ trợ phát âm."); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-CN"; u.rate = rate;
  if(zhVoice) u.voice = zhVoice;
  if(onend) u.onend = onend;
  speechSynthesis.speak(u);
}
function audioBtn(text, label="🔊"){ return `<button class="btn-audio" onclick="speak('${text.replace(/'/g,"\\'")}')" title="Nghe">${label}</button>`; }

/* ---- 2.3 Điều hướng & tiến trình ---- */
const SECTIONS = [
  "1. Giới thiệu","2. Từ vựng","3. Flashcards","4. Luyện từ vựng","5. Bài đọc",
  "6. Đọc hiểu","7. Luyện nghe","8. Luyện viết","9. Luyện nói","10. Củng cố","11. Quiz"
];
const visited = new Set([0]);
let current = 0;
function buildNav(){
  const inner = $("#navInner");
  SECTIONS.forEach((name,i)=>{
    const b = el(`<button><span class="n">${i+1}</span>${name.replace(/^\d+\.\s*/,"")}</button>`);
    b.onclick = ()=>go(i);
    inner.appendChild(b);
  });
}
function go(i){
  speechSynthesis.cancel();
  current = i; visited.add(i);
  document.querySelectorAll("section.step").forEach((s,k)=>s.classList.toggle("active",k===i));
  document.querySelectorAll("nav.steps button").forEach((b,k)=>{
    b.classList.toggle("active",k===i);
    b.classList.toggle("done",visited.has(k)&&k!==i);
  });
  $("#progBar").style.width = Math.round(visited.size/SECTIONS.length*100)+"%";
  $("#progLbl").textContent = `Tiến trình: ${visited.size}/${SECTIONS.length} phần đã xem`;
  window.scrollTo({top:0,behavior:"smooth"});
}
function navBtns(i){
  return `<div class="stepnav">
    ${i>0?`<button class="btn btn-ghost" onclick="go(${i-1})">← ${SECTIONS[i-1]}</button>`:"<span></span>"}
    ${i<SECTIONS.length-1?`<button class="btn btn-primary" onclick="go(${i+1})">${SECTIONS[i+1]} →</button>`:"<span></span>"}
  </div>`;
}

/* ---- 2.5 Bộ câu hỏi trắc nghiệm dùng chung ----
   items: [{q, opts, a, expl, audio?}] — render vào containerId, có điểm + làm lại */
const MCQ_SETS = {};
function renderMCQ(cid, items, opts={}){
  MCQ_SETS[cid] = {items, opts};
  const box = document.getElementById(cid);
  let score = 0, answered = 0;
  box.innerHTML = "";
  items.forEach((it,qi)=>{
    const q = el(`<div class="q">
      <div class="qt">${it.audio?audioBtn(it.audio,"🔊 Nghe")+" ":""}<span class="${opts.hzQ?'hz':''}">${it.q}</span></div>
      <div class="opts"></div>
      <div class="expl">${esc(it.expl||"")}</div>
    </div>`);
    const optBox = q.querySelector(".opts");
    const order = opts.keepOrder ? it.opts.map((_,k)=>k) : shuffle(it.opts.map((_,k)=>k));
    order.forEach(k=>{
      const b = el(`<button class="opt ${opts.hzOpts?'hz':''}">${it.opts[k]}</button>`);
      b.onclick = ()=>{
        if(q.dataset.done) return;
        q.dataset.done = 1; answered++;
        if(k===it.a){ b.classList.add("right"); score++; }
        else{
          b.classList.add("wrong");
          optBox.querySelectorAll(".opt").forEach((ob,oi)=>{ if(order[oi]===it.a) ob.classList.add("right"); });
        }
        q.querySelector(".expl").classList.add("show");
        box.querySelector(".sc-val").textContent = `${score}/${items.length}`;
        if(answered===items.length){
          box.querySelector(".sc-msg").textContent = score===items.length ? "🎉 Xuất sắc!" : (score>=items.length*0.7 ? "👍 Làm tốt lắm!" : "💪 Xem lại đáp án rồi làm lại nhé!");
        }
      };
      optBox.appendChild(b);
    });
    box.appendChild(q);
  });
  box.appendChild(el(`<div class="scorebar">
    <span>Điểm: <b class="sc-val">0/${items.length}</b> <span class="sc-msg"></span></span>
    <button class="btn btn-soft btn-sm" onclick="renderMCQ('${cid}', MCQ_SETS['${cid}'].items, MCQ_SETS['${cid}'].opts)">🔄 Làm lại</button>
  </div>`));
}

/* ---- 2.6 Trò chơi nối cặp dùng chung ----
   pairs: [[trái, phải], …] */
const MATCH_SETS = {};
function renderMatch(cid, pairs, lblL, lblR, hzLeft=true){
  MATCH_SETS[cid] = {pairs, lblL, lblR, hzLeft};
  const box = document.getElementById(cid);
  box.innerHTML = `<div class="match-cols">
      <div><h4>${lblL}</h4><div class="tiles L"></div></div>
      <div><h4>${lblR}</h4><div class="tiles R"></div></div>
    </div>
    <div class="scorebar"><span>Đã nối đúng: <b class="mt-done">0/${pairs.length}</b> · Số lần thử: <b class="mt-try">0</b></span>
    <button class="btn btn-soft btn-sm" onclick="renderMatch('${cid}',MATCH_SETS['${cid}'].pairs,'${lblL}','${lblR}',${hzLeft})">🔄 Làm lại</button></div>`;
  const L = box.querySelector(".L"), R = box.querySelector(".R");
  let selL=null, done=0, tries=0;
  shuffle(pairs.map((p,i)=>({t:p[0],i}))).forEach(o=>{
    const t = el(`<button class="tile ${hzLeft?'hz':''}">${o.t}</button>`);
    t.onclick = ()=>{ if(t.classList.contains("ok"))return;
      L.querySelectorAll(".tile").forEach(x=>x.classList.remove("sel"));
      t.classList.add("sel"); selL={idx:o.i, node:t}; };
    L.appendChild(t);
  });
  shuffle(pairs.map((p,i)=>({t:p[1],i}))).forEach(o=>{
    const t = el(`<button class="tile">${o.t}</button>`);
    t.onclick = ()=>{
      if(t.classList.contains("ok") || !selL) return;
      tries++; box.querySelector(".mt-try").textContent = tries;
      if(o.i===selL.idx){
        t.classList.add("ok"); selL.node.classList.remove("sel"); selL.node.classList.add("ok");
        selL=null; done++;
        box.querySelector(".mt-done").textContent = `${done}/${pairs.length}`;
        if(done===pairs.length) box.querySelector(".mt-done").insertAdjacentHTML("afterend"," 🎉");
      } else {
        t.classList.add("err"); selL.node.classList.add("err");
        setTimeout(()=>{ box.querySelectorAll(".err").forEach(x=>x.classList.remove("err")); },380);
      }
    };
    R.appendChild(t);
  });
}

/* ---- 2.7 Sắp xếp (câu / pinyin / thứ tự) dùng chung ----
   mỗi item: {chunks (đúng thứ tự), label?, vi?, expl?, audio?} */
const ARR_SETS = {};
function renderArrange(cid, items, opt={}){
  ARR_SETS[cid] = {items, opt};
  const box = document.getElementById(cid);
  box.innerHTML = "";
  let score=0, checked=0;
  items.forEach((it,ii)=>{
    const q = el(`<div class="q">
      <div class="qt">${it.audio?audioBtn(it.audio,"🔊 Nghe")+" ":""}${esc(it.label|| (opt.label||"Sắp xếp thành câu đúng:"))} ${it.vi?`<span class="py-sm">(${esc(it.vi)})</span>`:""}</div>
      <div class="arr-slot"></div>
      <div class="tiles src"></div>
      <div><button class="btn btn-soft btn-sm chk">✔ Kiểm tra</button>
           <button class="btn btn-ghost btn-sm rs">↺ Xếp lại</button></div>
      <div class="arr-fb"></div>
      <div class="expl">${esc(it.expl||"")}</div>
    </div>`);
    const slot=q.querySelector(".arr-slot"), src=q.querySelector(".src"), fb=q.querySelector(".arr-fb");
    let placed=[];
    function fill(){
      src.innerHTML=""; slot.innerHTML=""; placed=[]; fb.textContent=""; fb.className="arr-fb";
      shuffle(it.chunks.map((c,i)=>({c,i}))).forEach(o=>{
        const t=el(`<button class="tile ${opt.py?'':'hz'}">${esc(o.c)}</button>`);
        t.onclick=()=>{
          if(t.classList.contains("used"))return;
          t.classList.add("used");
          const p=el(`<button class="tile ${opt.py?'':'hz'}">${esc(o.c)}</button>`);
          p.onclick=()=>{ p.remove(); t.classList.remove("used"); placed=placed.filter(x=>x!==p); };
          p.dataset.c=o.c; placed.push(p); slot.appendChild(p);
        };
        src.appendChild(t);
      });
    }
    fill();
    q.querySelector(".rs").onclick=fill;
    q.querySelector(".chk").onclick=()=>{
      const got = placed.map(p=>p.dataset.c).join(opt.py?" ":"");
      const want = it.chunks.join(opt.py?" ":"");
      if(q.dataset.ok) return;
      if(got===want){
        if(!q.dataset.scored){ score++; checked++; q.dataset.scored=1; }
        q.dataset.ok=1;
        fb.textContent="✔ Chính xác! "+want; fb.classList.add("ok");
        q.querySelector(".expl").classList.add("show");
        speak(opt.py ? it.hz||"" : want);
      } else {
        if(!q.dataset.scored){ checked++; q.dataset.scored=1; }
        fb.textContent="✘ Chưa đúng. Đáp án: "+want; fb.classList.add("no");
        q.querySelector(".expl").classList.add("show");
      }
      box.querySelector(".sc-val").textContent = `${score}/${items.length}`;
    };
    box.appendChild(q);

/* Trò 7: memory game — 8 cặp (16 thẻ) */
function renderMemory(cid){
  const box = document.getElementById(cid);
  const picks = shuffle(VOCAB).slice(0,8);
  const cards = shuffle(picks.flatMap((v,i)=>[{k:i,t:v.hz,hz:1},{k:i,t:v.vi,hz:0}]));
  box.innerHTML = `<div class="mem-grid"></div>
    <div class="scorebar"><span>Cặp đã mở: <b class="mm-done">0/8</b> · Lượt lật: <b class="mm-try">0</b></span>
    <button class="btn btn-soft btn-sm" onclick="renderMemory('${cid}')">🔄 Chơi lại</button></div>`;
  const grid = box.querySelector(".mem-grid");
  let open=null, lock=false, done=0, tries=0;
  cards.forEach(c=>{
    const m = el(`<div class="mem"><div class="f f1">❀</div><div class="f f2 ${c.hz?'hz':''}">${c.t}</div></div>`);
    m.onclick = ()=>{
      if(lock || m.classList.contains("flip")) return;
      m.classList.add("flip");
      if(!open){ open={m,c}; return; }
      tries++; box.querySelector(".mm-try").textContent = tries;
      if(open.c.k===c.k){
        m.classList.add("done"); open.m.classList.add("done");
        done++; box.querySelector(".mm-done").textContent = `${done}/8` + (done===8?" 🎉":"");
        speak(c.hz? c.t : open.c.t);
        open=null;
      } else {
        lock=true; const o=open; open=null;
        setTimeout(()=>{ m.classList.remove("flip"); o.m.classList.remove("flip"); lock=false; },800);
      }
    };
    grid.appendChild(m);
  });
}

  box.innerHTML = `<div style="text-align:center;padding:10px">

}
let tgBest = 0;
function startTimed(cid){
  const box = document.getElementById(cid);
  let time=60, score=0;
  box.innerHTML = `<div class="timer-head"><span class="timer-big" id="tgTime">⏱ 60s</span><span>Điểm: <b class="timer-big" id="tgScore">0</b></span></div>
    <div class="timer-q"><span class="hz" id="tgHz"></span><div class="opts" id="tgOpts"></div></div>`;
  function nextQ(){
    const v = VOCAB[Math.floor(Math.random()*VOCAB.length)];
    const wrong = shuffle(VOCAB.filter(x=>x!==v)).slice(0,3).map(x=>x.vi);
    const opts = shuffle([v.vi,...wrong]);
    $("#tgHz").textContent = v.hz;
    const ob = $("#tgOpts"); ob.innerHTML="";
    opts.forEach(o=>{
      const b = el(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        if(o===v.vi){ score++; $("#tgScore").textContent=score; b.classList.add("right"); }
        else b.classList.add("wrong");
        setTimeout(nextQ,250);
      };
      ob.appendChild(b);
    });
  }
  nextQ();
  clearInterval(tgTimer);
  tgTimer = setInterval(()=>{
    time--; $("#tgTime").textContent = "⏱ "+time+"s";
    if(time<=0){
      clearInterval(tgTimer);
      tgBest = Math.max(tgBest, score);
      box.innerHTML = `<div class="result-box"><div class="big">${score} điểm</div>
        <div class="msg">${score>=15?"🏆 Siêu tốc độ!":score>=8?"👍 Rất tốt!":"💪 Chơi lại để nhanh hơn nhé!"} · Kỷ lục: ${tgBest}</div>
        <button class="btn btn-primary" style="margin-top:12px" onclick="startTimed('${cid}')">🔄 Chơi lại</button></div>`;
    }
  },1000);
}

$("#s11").innerHTML = `
  <h2><span class="ic">🏆</span>Phần 11 · Quiz tổng hợp (18 câu)</h2>
  <p class="desc">Từ vựng · đọc hiểu · nghe hiểu · sắp xếp câu · hoàn thành hội thoại. Làm hết để nhận kết quả!</p>
  <div class="card"><div id="quizBox"></div></div>
  <div class="card result-box" id="quizResult" style="display:none"></div>
  ${navBtns(10)}
`;
let quizScore = 0, quizDone = 0;
function renderQuiz(){
  quizScore = 0; quizDone = 0;
  $("#quizResult").style.display = "none";
  const box = $("#quizBox");
  box.innerHTML = "";
  QUIZ.forEach((it,qi)=>{
    if(it.type==="mcq"){
      const q = el(`<div class="q"><div class="qt">Câu ${qi+1}. ${it.audio?audioBtn(it.audio,"🔊 Nghe")+" ":""}<span class="hz">${it.q}</span></div>
        <div class="opts"></div><div class="expl">${esc(it.expl)}</div></div>`);
      const ob = q.querySelector(".opts");
      const order = shuffle(it.opts.map((_,k)=>k));
      order.forEach(k=>{
        const b = el(`<button class="opt hz">${it.opts[k]}</button>`);
        b.onclick=()=>{
          if(q.dataset.done) return; q.dataset.done=1; quizDone++;
          if(k===it.a){ b.classList.add("right"); quizScore++; }
          else { b.classList.add("wrong");
            ob.querySelectorAll(".opt").forEach((x,oi)=>{ if(order[oi]===it.a) x.classList.add("right"); }); }
          q.querySelector(".expl").classList.add("show");
          quizCheckEnd();
        };
        ob.appendChild(b);
      });
      box.appendChild(q);
    } else { /* arrange */
      const q = el(`<div class="q"><div class="qt">Câu ${qi+1}. ${esc(it.q)}</div>
        <div class="arr-slot"></div><div class="tiles src"></div>
        <div><button class="btn btn-soft btn-sm chk">✔ Kiểm tra</button></div>
        <div class="arr-fb"></div><div class="expl">${esc(it.expl)}</div></div>`);
      const slot=q.querySelector(".arr-slot"), src=q.querySelector(".src"), fb=q.querySelector(".arr-fb");
      let placed=[];
      shuffle(it.chunks.map((c,i)=>({c,i}))).forEach(o=>{
        const t=el(`<button class="tile hz">${o.c}</button>`);
        t.onclick=()=>{ if(t.classList.contains("used"))return;
          t.classList.add("used");
          const p=el(`<button class="tile hz">${o.c}</button>`);
          p.dataset.c=o.c;
          p.onclick=()=>{ p.remove(); t.classList.remove("used"); placed=placed.filter(x=>x!==p); };
          placed.push(p); slot.appendChild(p); };
        src.appendChild(t);
      });
      q.querySelector(".chk").onclick=()=>{
        if(q.dataset.done) return; q.dataset.done=1; quizDone++;
        const got = placed.map(p=>p.dataset.c).join(""), want = it.chunks.join("");
        if(got===want){ quizScore++; fb.textContent="✔ Chính xác! "+want; fb.classList.add("ok"); }
        else { fb.textContent="✘ Chưa đúng. Đáp án: "+want; fb.classList.add("no"); }
        q.querySelector(".expl").classList.add("show");
        quizCheckEnd();
      };
      box.appendChild(q);
    }
  });
  box.appendChild(el(`<div class="scorebar"><span>Đã làm: <b id="qzProg">0/${QUIZ.length}</b></span>
    <button class="btn btn-soft btn-sm" onclick="renderQuiz()">🔄 Làm lại quiz</button></div>`));
}
function quizCheckEnd(){
  $("#qzProg").textContent = `${quizDone}/${QUIZ.length}`;
  if(quizDone < QUIZ.length) return;
  const pct = Math.round(quizScore/QUIZ.length*100);
  const msg = pct>=90 ? "🏆 Xuất sắc! Bạn đã nắm vững bài 下班以后!"
    : pct>=70 ? "🎉 Rất tốt! Xem lại vài câu sai là hoàn hảo."
    : pct>=50 ? "👍 Khá ổn! Hãy ôn lại Phần 2 (Từ vựng) và Phần 5 (Bài đọc) nhé."
    : "💪 Đừng nản! Học lại Flashcards (Phần 3) rồi làm lại quiz nhé.";
  const r = $("#quizResult");
  r.style.display = "block";
  r.innerHTML = `<div class="big">${quizScore}/${QUIZ.length} · ${pct}%</div>
    <div class="msg">${msg}</div>
    <button class="btn btn-primary" style="margin-top:14px" onclick="renderQuiz();window.scrollTo({top:0,behavior:'smooth'})">🔄 Làm lại quiz</button>`;
  r.scrollIntoView({behavior:"smooth"});
}
renderQuiz();
